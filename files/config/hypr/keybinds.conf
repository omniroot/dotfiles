###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$browser = zen-browser
$terminal = kitty
$fileManager = nautilus
$colorPicker = wl-copy $(hyprpicker)
$menu = rofi -show drun

$hideWaybar = killall -SIGUSR1 waybar
$restartWaybar = killall -SIGUSR2 waybar
$restartHyprland = $terminal -e hyprctl reload
$fullScreenshot = hyprshot --mode output --current -o ~/Pictures/screenshots
$regionScreenshot = hyprshot --mode region -o ~/Pictures/screenshots
$flameshot = flameshot gui
$randomWallpaper = waypaper --random
$logoutMenu = wlogout -l ~/.config/wlogout/layout -C ~/.config/wlogout/style.css -b 2 -L 600 -R 600 --protocol layer-shell -s

$musicNext = mpc next 
$musicPrev = mpc prev 
# $noctaliaLauncher = qs -c noctalia-shell ipc call launcher toggle
$shellLauncher = dms ipc launcher open
# $shellLauncher = qs -c noctalia-shell ipc call launcher
$noctaliaControlCenter = qs -c noctalia-shell ipc call controlCenter toggle
$noctaliaSettings = qs -c noctalia-shell ipc call settings toggle
$noctaliaWindows = qs -c noctalia-shell ipc call launcher windows
$noctaliaWallpapers = qs -c noctalia-shell ipc call wallpaper toggle


# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, J, togglesplit,

bind = $mainMod, G, togglegroup,
bind = $mainMod, TAB, changegroupactive,

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, comma, exec, $musicPrev
bind = $mainMod, period, exec, $musicNext


bind = $mainMod, R, exec, $shellLauncher
bind = $mainMod SHIFT, S, exec, $noctaliaSettings
bind = $mainMod, W, exec, $noctaliaWindows
bind = $mainMod SHIFT, W, exec, $noctaliaWallpapers

bind = $mainMod, Z, exec, $logoutMenu
bind = $mainMod, X, exec, $colorPicker,
bind = $mainMod, S, exec, $flameshot
bind = $mainMod SHIFT, R, exec, $restartWaybar
# bind = $mainMod, D, exec, $colorPicker
; bind = $mainMod SHIFT, S, exec, $regionScreenshot




# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
